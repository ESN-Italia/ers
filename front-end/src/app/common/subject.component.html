<ion-item [button]="subject?.id" [color]="color" [lines]="lines" [class.small]="size === 'small'"
  (click)="openOnESNAccounts()">
  <ion-avatar slot="start">
    <ion-img [src]="subject.avatarURL ?? app.getAvatarFallbackURL(subject.type !== SubjectTypes.USER)"
      (ionError)="app.fallbackAvatar($event?.target, subject.type !== SubjectTypes.USER)"></ion-img>
  </ion-avatar>

  <ion-text class="ion-text-wrap">
    <h2>{{ subject.name ?? ('COMMON.UNKNOWN' | translate) }}</h2>
    <ion-note *ngIf="size !== 'small' && subject.getOrigin()">{{ subject.getOrigin() }}</ion-note>
  </ion-text>
</ion-item>
