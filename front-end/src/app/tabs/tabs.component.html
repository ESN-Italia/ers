<ion-tabs [class.desktopTabs]="!app.isInMobileMode()" [class.mobileTabs]="app.isInMobileMode()">
  <ion-tab-bar color="ideaToolbar" slot="top" *ngIf="!app.isInMobileMode()">
    <ion-tab-button (click)="app.goTo([''])">
      <ion-img [src]="app.getIcon(true)"></ion-img>
    </ion-tab-button>
    <ion-tab-button tab="ers-events">
      <ion-label>{{ 'TABS.EVENTS' | translate }}</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="profile">
      <ion-label>{{ 'TABS.PROFILE' | translate }}</ion-label>
    </ion-tab-button>
    <ion-tab-button tab="configurations" *ngIf="app.user.isAdministrator">
      <ion-label>{{ 'TABS.CONFIGURATIONS' | translate }}</ion-label>
    </ion-tab-button>
  </ion-tab-bar>

  <ion-tab-bar color="ideaToolbar" slot="bottom" *ngIf="app.isInMobileMode()">
    <ion-tab-button tab="ers-events">
      <ion-icon icon="calendar"></ion-icon>
    </ion-tab-button>
    <ion-tab-button tab="profile">
      <ion-icon icon="person"></ion-icon>
    </ion-tab-button>
    <ion-tab-button tab="configurations" *ngIf="app.user.isAdministrator">
      <ion-icon icon="settings"></ion-icon>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
